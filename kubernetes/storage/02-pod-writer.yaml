apiVersion: v1
kind: Pod
metadata:
  name: storage-writer
  namespace: app-demo
spec:
  containers:
    - name: writer
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]   # so fica vivo pra gente entrar nele
      volumeMounts:
        - name: dados
          mountPath: /data                   # monta o volume aqui dentro
  volumes:
    - name: dados
      persistentVolumeClaim:
        claimName: app-demo-data             # usa o PVC que criamos